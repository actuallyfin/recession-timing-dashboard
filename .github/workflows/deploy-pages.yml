name: Build and Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # After the 4:10pm ET completed-bar buffer in data_loader.py.
    - cron: "20 21 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python dashboard.py --refresh
          touch output/.nojekyll

      - name: Check out ActuallyFinance site
        uses: actions/checkout@v4
        with:
          repository: actuallyfin/actuallyfinance-site
          token: ${{ secrets.SITE_SYNC_TOKEN }}
          path: actuallyfinance-site

      - name: Sync dashboard to actuallyfinance.com site repo
        run: |
          rm -rf actuallyfinance-site/recession-timing-dashboard
          mkdir -p actuallyfinance-site/recession-timing-dashboard
          cp -a output/. actuallyfinance-site/recession-timing-dashboard/

      - name: Commit dashboard sync
        working-directory: actuallyfinance-site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add recession-timing-dashboard
          if git diff --cached --quiet; then
            echo "No actuallyfinance-site dashboard changes to sync."
          else
            git commit -m "Sync recession timing dashboard"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
